<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#f4efe7">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">

<title>默背俄语 02</title>
<style>
:root{--bg:#f4efe7;--card:#fffdf8;--ink:#1d1a16;--muted:#72695e;--line:#ded3c5;--accent:#8a3f37;--ok:#42734d;--bad:#b34444;--soft:#ebe1d4}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif}.app{max-width:520px;margin:auto;min-height:100vh;padding:16px 14px 82px}.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}h1{font-family:Georgia,"Songti SC",serif;font-size:29px;font-weight:500;margin:0}.sub{font-size:12px;color:var(--muted);margin-top:2px}.pill,.tab,.btn,.opt{border:1px solid var(--line);border-radius:8px;background:var(--card);color:inherit}.pill{padding:7px 10px;border-radius:18px}.tabs{display:flex;gap:6px;overflow:auto;margin-bottom:10px}.tab{padding:8px 12px;white-space:nowrap;color:var(--muted)}.tab.on{background:var(--ink);color:var(--card);border-color:var(--ink)}.card{background:var(--card);border:1px solid var(--line);border-radius:8px;padding:15px;margin-bottom:10px}.hero{background:var(--ink);color:var(--card);border-color:var(--ink)}.hero h2{font-family:Georgia,"Songti SC",serif;font-size:34px;font-weight:500;line-height:1.05;margin:0 0 8px}.hero p{margin:0;color:rgba(255,255,255,.72);font-size:12px}.metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:14px}.metric{background:rgba(255,255,255,.08);border-radius:8px;padding:10px}.metric b{display:block;font-family:Georgia,serif;font-size:26px;font-weight:500}.metric span{font-size:10px;color:rgba(255,255,255,.68)}.btn{padding:12px;font-weight:650}.btn.main{background:var(--accent);border-color:var(--accent);color:white}.btn.ok{background:#e1ecd9;color:var(--ok)}.btn.bad{background:#f3dddd;color:var(--bad)}.row{display:flex;gap:8px}.row>*{flex:1}.ru{font-family:Georgia,"Times New Roman",serif;font-size:46px;text-align:center;line-height:1.1}.stress{text-align:center;font-family:Georgia,serif;font-size:22px;color:var(--muted);margin-top:8px}.cn{text-align:center;font-size:21px;margin-top:14px}.tag{display:inline-block;background:var(--soft);color:var(--muted);font-size:11px;border-radius:12px;padding:4px 8px}.meta{text-align:center;margin-top:12px}.ex{background:var(--soft);border-radius:8px;padding:11px;margin-top:14px}.small{font-size:12px;color:var(--muted)}.options{display:grid;gap:8px}.opt{text-align:left;padding:12px}.opt.good{background:#e1ecd9;border-color:#abc9a2;color:var(--ok)}.opt.bad{background:#f3dddd;border-color:#dfa9a9;color:var(--bad)}input{width:100%;border:1px solid var(--line);border-radius:8px;background:var(--card);padding:12px;font:inherit;margin:10px 0}.list{display:grid;gap:7px}.item{display:flex;justify-content:space-between;align-items:center;background:var(--soft);border-radius:8px;padding:10px}.item b{font-family:Georgia,serif;font-size:18px}.footer{position:fixed;left:0;right:0;bottom:0;background:rgba(244,239,231,.9);backdrop-filter:blur(12px);border-top:1px solid var(--line);padding:9px 14px env(safe-area-inset-bottom)}.foot{max-width:520px;margin:auto;display:flex;justify-content:space-between;color:var(--muted);font-size:12px}@media(max-width:380px){.ru{font-size:38px}.hero h2{font-size:29px}.row{flex-direction:column}}
</style>
</head>
<body>
<main class="app"><header class="top"><div><h1>默背俄语 02</h1><div class="sub">备用实验位 · App Lab 02</div></div><button class="pill" id="speak">发音</button></header><nav class="tabs" id="tabs"></nav><section id="view"></section></main><footer class="footer"><div class="foot"><span id="count">0 / 0</span><span id="known">掌握 0</span></div></footer>
<script>
const W=[['привет','приве́т','你好','问候','Привет, как дела?','你好，最近怎么样？'],['спасибо','спаси́бо','谢谢','问候','Большое спасибо!','非常感谢！'],['пожалуйста','пожа́луйста','请；不客气','问候','Пожалуйста, помогите.','请帮帮我。'],['извините','извини́те','对不起；请问','问候','Извините, где метро?','请问地铁在哪？'],['я','я','我','核心','Я учу русский язык.','我学俄语。'],['ты','ты','你','核心','Ты студент?','你是学生吗？'],['он','он','他','核心','Он мой друг.','他是我的朋友。'],['она','она́','她','核心','Она врач.','她是医生。'],['это','э́то','这；这是','核心','Это мой дом.','这是我的家。'],['где','где','哪里','核心','Где туалет?','卫生间在哪里？'],['дом','до́м','家；房子','生活','Это мой дом.','这是我的家。'],['город','го́род','城市','生活','Москва — большой город.','莫斯科是大城市。'],['книга','кни́га','书','学习','Это новая книга.','这是一本新书。'],['слово','сло́во','词；单词','学习','Это новое слово.','这是一个新单词。'],['читать','чита́ть','读','动词','Я читаю книгу.','我在读书。'],['писать','писа́ть','写','动词','Я пишу письмо.','我在写信。'],['говорить','говори́ть','说','动词','Я говорю по-русски.','我说俄语。'],['любить','люби́ть','喜欢；爱','动词','Я люблю кофе.','我喜欢咖啡。'],['вода','вода́','水','食物','Я пью воду.','我喝水。'],['хлеб','хле́б','面包','食物','Я ем хлеб.','我吃面包。'],['кофе','ко́фе','咖啡','食物','Я люблю кофе.','我喜欢咖啡。'],['чай','ча́й','茶','食物','Хочешь чай?','你想喝茶吗？'],['один','оди́н','一','数字','У меня один билет.','我有一张票。'],['два','два́','二','数字','Два кофе, пожалуйста.','请来两杯咖啡。'],['три','три́','三','数字','У меня три брата.','我有三个兄弟。'],['паспорт','па́спорт','护照','旅行','Где мой паспорт?','我的护照在哪里？'],['билет','биле́т','票；机票','旅行','У меня билет в Москву.','我有一张去莫斯科的票。'],['метро','метро́','地铁','旅行','Где метро?','地铁在哪里？']].map((x,i)=>({id:'w'+i,ru:x[0],stress:x[1],cn:x[2],topic:x[3],ex:x[4],exCn:x[5]}));
const M=[['today','今日'],['card','卡片'],['quiz','选择'],['spell','拼写'],['dict','词库'],['stats','统计']],K='app_lab_02_ru';let s={mode:'today',i:0,known:{},stats:{done:0,right:0,wrong:0},days:{}};try{Object.assign(s,JSON.parse(localStorage[K]||'{}'))}catch(e){}const $=id=>document.getElementById(id);function save(){localStorage[K]=JSON.stringify(s)}function cur(){return (s.session||W)[s.i%(s.session||W).length]||W[0]}function say(t){if(!speechSynthesis)return;let u=new SpeechSynthesisUtterance(t);u.lang='ru-RU';u.rate=.82;speechSynthesis.cancel();speechSynthesis.speak(u)}function mark(ok,id){s.stats.done++;ok?s.stats.right++:s.stats.wrong++;if(ok)s.known[id]=1;else delete s.known[id];s.days[new Date().toISOString().slice(0,10)]=1;save()}function tabs(){$('tabs').innerHTML=M.map(m=>`<button class="tab ${s.mode==m[0]?'on':''}" data-m="${m[0]}">${m[1]}</button>`).join('');document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{s.mode=b.dataset.m;s.session=null;s.i=0;r()})}function foot(){let l=s.session||W;$('count').textContent=(s.i+1)+' / '+l.length;$('known').textContent='掌握 '+Object.keys(s.known).length}function today(){let fresh=W.filter(w=>!s.known[w.id]).slice(0,10);$('view').innerHTML=`<div class="card hero"><h2>今天背 ${fresh.length} 个</h2><p>备用俄语实验位，可随时替换成新 app</p><div class="metrics"><div class="metric"><b>${fresh.length}</b><span>今日新词</span></div><div class="metric"><b>${Object.keys(s.known).length}</b><span>已掌握</span></div><div class="metric"><b>${s.stats.done}</b><span>总练习</span></div></div><div class="row" style="margin-top:14px"><button class="btn main" id="start">开始</button><button class="btn" id="goSpell">拼写</button></div></div>`;$('start').onclick=()=>{s.session=fresh.length?fresh:W;s.mode='card';s.i=0;r()};$('goSpell').onclick=()=>{s.session=fresh.length?fresh:W;s.mode='spell';s.i=0;r()}}function card(){let w=cur();$('view').innerHTML=`<div class="card"><div class="ru">${w.ru}</div><div class="stress">${w.stress}</div><div class="cn">${w.cn}</div><div class="meta"><span class="tag">${w.topic}</span></div><div class="ex"><p>${w.ex}</p><p class="small">${w.exCn}</p></div></div><div class="row"><button class="btn bad" id="no">模糊</button><button class="btn ok" id="yes">认识</button></div>`;$('yes').onclick=()=>{mark(1,w.id);next()};$('no').onclick=()=>{mark(0,w.id);next()}}function quiz(){let w=cur(),o=[w.cn];while(o.length<4){let c=W[Math.floor(Math.random()*W.length)].cn;if(!o.includes(c))o.push(c)}o.sort(()=>Math.random()-.5);$('view').innerHTML=`<div class="card"><div class="ru">${w.ru}</div><div class="stress">${w.stress}</div></div><div class="options">${o.map(x=>`<button class="opt" data-a="${x}">${x}</button>`).join('')}</div>`;document.querySelectorAll('.opt').forEach(b=>b.onclick=()=>{let ok=b.dataset.a==w.cn;b.classList.add(ok?'good':'bad');mark(ok,w.id);setTimeout(next,350)})}function spell(){let w=cur();$('view').innerHTML=`<div class="card"><p class="small">输入俄语单词</p><div class="cn">${w.cn}</div><input id="ans" autocomplete="off" autocapitalize="off"><div class="row"><button class="btn" id="hint">提示</button><button class="btn main" id="check">检查</button></div><p class="small" id="fb"></p></div>`;$('hint').onclick=()=>{$('ans').value=w.ru.slice(0,Math.max(1,$('ans').value.length+1))};$('check').onclick=()=>{let ok=$('ans').value.trim().toLowerCase()==w.ru.toLowerCase();$('fb').textContent=ok?'正确':'答案：'+w.ru+' · '+w.stress;mark(ok,w.id);setTimeout(next,700)}}function dict(){$('view').innerHTML=`<div class="card"><div class="list">${W.map(w=>`<div class="item"><span><b>${w.ru}</b><br><span class="small">${w.cn} · ${w.topic}</span></span><button class="pill" data-s="${w.ru}">听</button></div>`).join('')}</div></div>`;document.querySelectorAll('[data-s]').forEach(b=>b.onclick=()=>say(b.dataset.s))}function stats(){let rate=Math.round(s.stats.right/Math.max(1,s.stats.right+s.stats.wrong)*100);$('view').innerHTML=`<div class="card"><div class="metrics" style="color:var(--ink)"><div class="metric" style="background:var(--soft)"><b>${s.stats.done}</b><span>练习</span></div><div class="metric" style="background:var(--soft)"><b>${rate}%</b><span>正确率</span></div><div class="metric" style="background:var(--soft)"><b>${Object.keys(s.known).length}</b><span>掌握</span></div></div></div>`}function next(){let l=s.session||W;if(s.session&&s.i>=l.length-1){s.session=null;s.mode='today';s.i=0}else s.i=(s.i+1)%l.length;r()}function r(){tabs();({today,card,quiz,spell,dict,stats}[s.mode]||today)();foot();$('speak').onclick=()=>say(cur().ru)}if('serviceWorker'in navigator)navigator.serviceWorker.register('./sw.js');r();
</script>
</body>
</html>
